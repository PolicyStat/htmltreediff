name: CI

on:
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.8"
            lxml-spec: "lxml==4.2.5"
          # lxml v4
          - python-version: "3.8"
            lxml-spec: "lxml>=4,<5"
          - python-version: "3.10"
            lxml-spec: "lxml>=4,<5"
          - python-version: "3.11"
            lxml-spec: "lxml>=4,<5"
          - python-version: "3.12"
            lxml-spec: "lxml>=4,<5"
          # lxml v5
          - python-version: "3.8"
            lxml-spec: "lxml>=5,<6"
          - python-version: "3.10"
            lxml-spec: "lxml>=5,<6"
          - python-version: "3.11"
            lxml-spec: "lxml>=5,<6"
          - python-version: "3.12"
            lxml-spec: "lxml>=5,<6"
          # lxml v6
          - python-version: "3.8"
            lxml-spec: "lxml>=6,<7"
          - python-version: "3.10"
            lxml-spec: "lxml>=6,<7"
          - python-version: "3.11"
            lxml-spec: "lxml>=6,<7"
          - python-version: "3.12"
            lxml-spec: "lxml>=6,<7"
          # lxml latest
          - python-version: "3.12"
            lxml-spec: "lxml"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install "${{ matrix.lxml-spec }}"
          pip install -r requirements/default.txt -r requirements/testing.txt
          pip install -e .
      - name: Run tests
        run: pytest

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6.3.0
        with:
          python-version: "3.12"
      - run: pip install flake8
      - run: flake8 htmltreediff
